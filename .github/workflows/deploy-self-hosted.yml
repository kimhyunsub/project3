name: Deploy To Mini PC

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_type:
        description: "Choose deployment mode"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - restart
      branch:
        description: "Git branch to deploy"
        required: true
        default: "main"
        type: string

jobs:
  deploy:
    runs-on:
      - self-hosted
      - windows
      - attendance-prod

    steps:
      - name: Show deployment target
        shell: powershell
        run: |
          Write-Host "Deploy type: ${{ github.event.inputs.deploy_type || 'deploy' }}"
          Write-Host "Branch: ${{ github.event.inputs.branch || 'main' }}"
          Write-Host "Target path: C:\attendance-app\admin-web"

      - name: Run full deployment
        if: ${{ github.event_name == 'push' || github.event.inputs.deploy_type == 'deploy' }}
        shell: powershell
        run: |
          Set-Location "C:\attendance-app\admin-web"
          powershell -ExecutionPolicy Bypass -File ".\scripts\deploy-prod.ps1" -Branch "${{ github.event.inputs.branch || 'main' }}"

      - name: Run restart only
        if: ${{ github.event.inputs.deploy_type == 'restart' }}
        shell: powershell
        run: |
          Set-Location "C:\attendance-app\admin-web"
          powershell -ExecutionPolicy Bypass -File ".\scripts\restart-prod.ps1"

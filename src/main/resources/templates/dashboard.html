<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 출근 현황</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div>
            <div class="eyebrow">Attendance Admin</div>
            <h2>관리자 페이지</h2>
        </div>
        <nav class="nav-menu">
            <a th:href="@{/dashboard}" class="active">오늘 출근 현황</a>
            <a th:href="@{/attendance/monthly}">월별 출근 현황</a>
            <a th:href="@{/employees}">직원 목록</a>
            <a th:href="@{/settings/location}">회사 위치 설정</a>
        </nav>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="secondary-button full-width">로그아웃</button>
        </form>
    </aside>

    <main class="content">
        <section class="page-header">
            <div>
                <div class="eyebrow">Dashboard</div>
                <h1>오늘 출근 현황</h1>
            </div>
            <p th:text="${workplaceScopedAdmin} ? '담당 사업장 직원들의 출근 상태를 한눈에 확인할 수 있습니다.' : '직원들의 출근 상태를 한눈에 확인할 수 있습니다.'">직원들의 출근 상태를 한눈에 확인할 수 있습니다.</p>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>사업장 필터</h2>
            </div>
            <form th:action="@{/dashboard}" method="get" class="filter-form">
                <input type="hidden" name="filter" th:value="${selectedFilter}">
                <label>
                    사업장
                    <select name="workplaceId">
                        <option value="" th:if="${!workplaceScopedAdmin}">전체</option>
                        <option value="0" th:if="${!workplaceScopedAdmin}" th:selected="${selectedWorkplaceId != null and selectedWorkplaceId == 0}">본사</option>
                        <option th:each="workplace : ${workplaceOptions}"
                                th:value="${workplace.id()}"
                                th:selected="${selectedWorkplaceId != null and selectedWorkplaceId == workplace.id()}"
                                th:text="${workplace.name()}">사업장</option>
                    </select>
                </label>
                <button type="submit" class="primary-button" th:if="${!workplaceScopedAdmin}">적용</button>
            </form>
        </section>

        <section class="card-grid">
            <a th:href="@{/dashboard(workplaceId=${selectedWorkplaceId})}" class="stat-link">
                <article class="stat-card" th:classappend="${selectedFilter == 'ALL'} ? ' selected'">
                    <span>전체 직원</span>
                    <strong th:text="${summary.totalEmployees()}">0</strong>
                </article>
            </a>
            <a th:href="@{/dashboard(filter='PRESENT', workplaceId=${selectedWorkplaceId})}" class="stat-link">
                <article class="stat-card" th:classappend="${selectedFilter == 'PRESENT'} ? ' selected'">
                    <span>정상 출근</span>
                    <strong th:text="${summary.presentCount()}">0</strong>
                </article>
            </a>
            <a th:href="@{/dashboard(filter='LATE', workplaceId=${selectedWorkplaceId})}" class="stat-link">
                <article class="stat-card warning" th:classappend="${selectedFilter == 'LATE'} ? ' selected'">
                    <span>지각</span>
                    <strong th:text="${summary.lateCount()}">0</strong>
                </article>
            </a>
            <a th:href="@{/dashboard(filter='ABSENT', workplaceId=${selectedWorkplaceId})}" class="stat-link">
                <article class="stat-card danger" th:classappend="${selectedFilter == 'ABSENT'} ? ' selected'">
                    <span>미출근</span>
                    <strong th:text="${summary.absentCount()}">0</strong>
                </article>
            </a>
            <a th:href="@{/dashboard(filter='CHECKED_OUT', workplaceId=${selectedWorkplaceId})}" class="stat-link">
                <article class="stat-card" th:classappend="${selectedFilter == 'CHECKED_OUT'} ? ' selected'">
                    <span>퇴근 완료</span>
                    <strong th:text="${summary.checkedOutCount()}">0</strong>
                </article>
            </a>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2 th:text="${selectedFilterLabel} + ' 목록'">실시간 출근 목록</h2>
                <div class="button-row">
                    <span class="pill neutral" th:text="'총 ' + ${#lists.size(recentAttendances)} + '명'">총 0명</span>
                    <a th:if="${selectedFilter != 'ALL'}"
                       th:href="@{/dashboard(workplaceId=${selectedWorkplaceId})}"
                       class="ghost-link small-link">전체 보기</a>
                </div>
            </div>
            <div class="empty-state" th:if="${#lists.isEmpty(recentAttendances)}">선택한 조건에 해당하는 직원이 없습니다.</div>
            <table th:if="${!#lists.isEmpty(recentAttendances)}">
                <thead>
                <tr>
                    <th>사번</th>
                    <th>이름</th>
                    <th>사업장</th>
                    <th>권한</th>
                    <th>상태</th>
                    <th>출근 시간</th>
                    <th>퇴근 시간</th>
                    <th>메모</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="record : ${recentAttendances}">
                    <td th:text="${record.employeeCode()}">EMP001</td>
                    <td th:text="${record.employeeName()}">홍길동</td>
                    <td th:text="${record.workplaceName()}">본사</td>
                    <td th:text="${record.role()}">EMPLOYEE</td>
                    <td>
                        <span class="pill"
                              th:text="${record.state().label}"
                              th:classappend="${record.state().name() == 'WORKING'} ? ' success' :
                                              (${record.state().name() == 'LATE'} ? ' warning' :
                                              (${record.state().name() == 'ABSENT'} ? ' danger' : ' neutral'))">
                            상태
                        </span>
                    </td>
                    <td th:text="${record.checkInTime()}">09:00</td>
                    <td th:text="${record.checkOutTime()}">18:00</td>
                    <td th:text="${record.note()}">메모</td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>

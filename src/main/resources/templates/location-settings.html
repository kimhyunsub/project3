<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회사 위치 설정</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div>
            <div class="eyebrow">Attendance Admin</div>
            <h2>관리자 페이지</h2>
        </div>
        <nav class="nav-menu">
            <a th:href="@{/dashboard}">오늘 출근 현황</a>
            <a th:href="@{/attendance/monthly}">월별 출근 현황</a>
            <a th:href="@{/employees}">직원 목록</a>
            <a th:href="@{/settings/location}" class="active">회사 위치 설정</a>
        </nav>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="secondary-button full-width">로그아웃</button>
        </form>
    </aside>

    <main class="content">
        <section class="page-header">
            <div>
                <div class="eyebrow">Settings</div>
                <h1>회사 위치 설정</h1>
            </div>
            <p>백엔드 DB의 회사 좌표와 출근 반경을 직접 관리합니다.</p>
        </section>

        <div class="alert success" th:if="${message}" th:text="${message}">저장되었습니다.</div>

        <section class="settings-layout">
            <article class="panel">
                <h2>현재 설정</h2>
                <div class="location-preview">
                    <p><strong>회사명</strong> <span th:text="${location.companyName()}">회사명</span></p>
                    <p><strong>좌표</strong>
                        <span id="currentLatitudeText" th:text="${location.latitude()}">0</span>,
                        <span id="currentLongitudeText" th:text="${location.longitude()}">0</span>
                    </p>
                    <p><strong>허용 반경</strong> <span id="currentRadiusText" th:text="${location.allowedRadiusMeters()}">0</span>m</p>
                    <p><strong>지각 기준</strong> <span th:text="${location.lateAfterTime()}">09:00</span></p>
                </div>
                <div class="map-help-card">
                    <strong>지도 사용 방법</strong>
                    <p>지도를 클릭하거나 핀을 드래그하면 회사 좌표가 바로 반영됩니다. 허용 반경도 원으로 미리 확인할 수 있습니다.</p>
                </div>
            </article>

            <article class="panel">
                <h2>위치 수정</h2>
                <form th:action="@{/settings/location}" th:object="${locationForm}" method="post" class="settings-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <label>
                        회사명
                        <input type="text" th:field="*{companyName}" id="companyNameInput">
                        <small class="field-error" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></small>
                    </label>

                    <div class="map-shell">
                        <div id="companyMap"
                             class="company-map"
                             th:attr="data-latitude=${locationForm.latitude},
                                      data-longitude=${locationForm.longitude},
                                      data-radius=${locationForm.allowedRadiusMeters},
                                      data-company-name=${locationForm.companyName}">
                        </div>
                    </div>

                    <div class="button-row">
                        <button type="button" id="useCurrentLocationButton" class="ghost-link">현재 위치 사용</button>
                    </div>

                    <div class="form-row">
                        <label>
                            위도
                            <input type="number" step="0.000001" th:field="*{latitude}" id="latitudeInput">
                            <small class="field-error" th:if="${#fields.hasErrors('latitude')}" th:errors="*{latitude}"></small>
                        </label>
                        <label>
                            경도
                            <input type="number" step="0.000001" th:field="*{longitude}" id="longitudeInput">
                            <small class="field-error" th:if="${#fields.hasErrors('longitude')}" th:errors="*{longitude}"></small>
                        </label>
                    </div>

                    <label>
                        허용 반경(m)
                        <input type="number" th:field="*{allowedRadiusMeters}" id="radiusInput">
                        <small class="field-error" th:if="${#fields.hasErrors('allowedRadiusMeters')}" th:errors="*{allowedRadiusMeters}"></small>
                    </label>

                    <label>
                        지각 기준 시간
                        <input type="text" th:field="*{lateAfterTime}" readonly>
                    </label>

                    <label>
                        모바일 공지사항
                        <div class="editor-toolbar">
                            <button type="button" class="ghost-link small-link editor-button" data-editor-action="heading">제목</button>
                            <button type="button" class="ghost-link small-link editor-button" data-editor-action="bold">굵게</button>
                            <button type="button" class="ghost-link small-link editor-button" data-editor-action="bullet">목록</button>
                            <button type="button" class="ghost-link small-link editor-button" data-editor-action="link">링크</button>
                        </div>
                        <textarea th:field="*{noticeMessage}"
                                  id="noticeMessageInput"
                                  rows="5"
                                  placeholder="모바일 메인 화면에 노출할 공지사항을 입력해 주세요."></textarea>
                        <small class="field-error">제목, 굵게, 목록, 링크 정도의 간단한 서식을 사용할 수 있습니다.</small>
                        <small class="field-error" th:if="${#fields.hasErrors('noticeMessage')}" th:errors="*{noticeMessage}"></small>
                    </label>

                    <button type="submit" class="primary-button">저장하기</button>
                </form>
            </article>
        </section>
    </main>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script th:inline="javascript">
    const mapElement = document.getElementById("companyMap");
    const latitudeInput = document.getElementById("latitudeInput");
    const longitudeInput = document.getElementById("longitudeInput");
    const radiusInput = document.getElementById("radiusInput");
    const companyNameInput = document.getElementById("companyNameInput");
    const noticeMessageInput = document.getElementById("noticeMessageInput");
    const useCurrentLocationButton = document.getElementById("useCurrentLocationButton");
    const currentLatitudeText = document.getElementById("currentLatitudeText");
    const currentLongitudeText = document.getElementById("currentLongitudeText");
    const currentRadiusText = document.getElementById("currentRadiusText");
    const editorButtons = document.querySelectorAll("[data-editor-action]");

    if (mapElement && latitudeInput && longitudeInput && radiusInput && companyNameInput) {
        const initialLatitude = Number(mapElement.dataset.latitude);
        const initialLongitude = Number(mapElement.dataset.longitude);
        const initialRadius = Number(mapElement.dataset.radius);
        const companyName = mapElement.dataset.companyName || "회사 위치";

        const map = L.map(mapElement).setView([initialLatitude, initialLongitude], 16);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const marker = L.marker([initialLatitude, initialLongitude], {
            draggable: true
        }).addTo(map);
        marker.bindPopup(companyName);

        const radiusCircle = L.circle([initialLatitude, initialLongitude], {
            radius: initialRadius,
            color: "#0f766e",
            fillColor: "#14b8a6",
            fillOpacity: 0.14
        }).addTo(map);

        function formatCoordinate(value) {
            return Number(value).toFixed(6);
        }

        function updateLocation(latitude, longitude) {
            latitudeInput.value = formatCoordinate(latitude);
            longitudeInput.value = formatCoordinate(longitude);
            currentLatitudeText.textContent = formatCoordinate(latitude);
            currentLongitudeText.textContent = formatCoordinate(longitude);
            marker.setLatLng([latitude, longitude]);
            radiusCircle.setLatLng([latitude, longitude]);
        }

        function moveMap(latitude, longitude) {
            map.flyTo([latitude, longitude], Math.max(map.getZoom(), 16), {
                animate: true,
                duration: 0.6
            });
        }

        function updateRadius(radius) {
            const normalizedRadius = Number(radius) || 0;
            radiusCircle.setRadius(normalizedRadius);
            currentRadiusText.textContent = normalizedRadius;
        }

        companyNameInput.addEventListener("input", () => {
            const nextCompanyName = companyNameInput.value.trim() || "회사 위치";
            marker.bindPopup(nextCompanyName);
        });

        map.on("click", (event) => {
            updateLocation(event.latlng.lat, event.latlng.lng);
            moveMap(event.latlng.lat, event.latlng.lng);
        });

        marker.on("dragend", (event) => {
            const position = event.target.getLatLng();
            updateLocation(position.lat, position.lng);
            moveMap(position.lat, position.lng);
        });

        latitudeInput.addEventListener("input", () => {
            const latitude = Number(latitudeInput.value);
            const longitude = Number(longitudeInput.value);
            if (Number.isFinite(latitude) && Number.isFinite(longitude)) {
                updateLocation(latitude, longitude);
                moveMap(latitude, longitude);
            }
        });

        longitudeInput.addEventListener("input", () => {
            const latitude = Number(latitudeInput.value);
            const longitude = Number(longitudeInput.value);
            if (Number.isFinite(latitude) && Number.isFinite(longitude)) {
                updateLocation(latitude, longitude);
                moveMap(latitude, longitude);
            }
        });

        radiusInput.addEventListener("input", () => {
            updateRadius(radiusInput.value);
        });

        if (useCurrentLocationButton) {
            useCurrentLocationButton.addEventListener("click", () => {
                if (!navigator.geolocation) {
                    window.alert("현재 브라우저에서는 위치 정보를 사용할 수 없습니다.");
                    return;
                }

                useCurrentLocationButton.disabled = true;
                useCurrentLocationButton.textContent = "현재 위치 확인 중...";

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const latitude = position.coords.latitude;
                        const longitude = position.coords.longitude;
                        updateLocation(latitude, longitude);
                        moveMap(latitude, longitude);
                        useCurrentLocationButton.disabled = false;
                        useCurrentLocationButton.textContent = "현재 위치 사용";
                    },
                    () => {
                        window.alert("현재 위치를 가져오지 못했습니다. 브라우저 위치 권한을 확인해 주세요.");
                        useCurrentLocationButton.disabled = false;
                        useCurrentLocationButton.textContent = "현재 위치 사용";
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            });
        }

        updateLocation(initialLatitude, initialLongitude);
        updateRadius(initialRadius);
    }

    function wrapNoticeSelection(prefix, suffix, fallbackText) {
        if (!noticeMessageInput) {
            return;
        }

        const start = noticeMessageInput.selectionStart ?? 0;
        const end = noticeMessageInput.selectionEnd ?? 0;
        const selectedText = noticeMessageInput.value.slice(start, end) || fallbackText;
        const nextValue =
            noticeMessageInput.value.slice(0, start) +
            prefix +
            selectedText +
            suffix +
            noticeMessageInput.value.slice(end);

        noticeMessageInput.value = nextValue;
        noticeMessageInput.focus();
        const selectionStart = start + prefix.length;
        const selectionEnd = selectionStart + selectedText.length;
        noticeMessageInput.setSelectionRange(selectionStart, selectionEnd);
    }

    function insertNoticeText(insertText) {
        if (!noticeMessageInput) {
            return;
        }

        const start = noticeMessageInput.selectionStart ?? 0;
        const end = noticeMessageInput.selectionEnd ?? 0;
        const nextValue =
            noticeMessageInput.value.slice(0, start) +
            insertText +
            noticeMessageInput.value.slice(end);

        noticeMessageInput.value = nextValue;
        noticeMessageInput.focus();
        const cursor = start + insertText.length;
        noticeMessageInput.setSelectionRange(cursor, cursor);
    }

    editorButtons.forEach((button) => {
        button.addEventListener("click", () => {
            const action = button.dataset.editorAction;

            if (action === "heading") {
                insertNoticeText("## 제목을 입력해 주세요\n");
                return;
            }

            if (action === "bold") {
                wrapNoticeSelection("**", "**", "강조 문구");
                return;
            }

            if (action === "bullet") {
                insertNoticeText("- 항목을 입력해 주세요\n");
                return;
            }

            if (action === "link") {
                wrapNoticeSelection("[", "](https://example.com)", "링크 문구");
            }
        });
    });
</script>
</body>
</html>

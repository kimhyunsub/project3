spring:
  thymeleaf:
    cache: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/attendance_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: ${SERVER_PORT:8081}
  servlet:
    session:
      timeout: 365d
